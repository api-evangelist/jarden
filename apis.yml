aid: jarden
name: Jarden
description: >-
  Jarden Corporation was an American consumer products conglomerate that owned
  brands across Outdoor Solutions (Coleman, K2 Sports, Marmot, Rawlings),
  Consumer Solutions (Crock-Pot, Mr. Coffee, Sunbeam, Oster, FoodSaver),
  Branded Consumables (Yankee Candle, First Alert, Diamond Match), and Process
  Solutions. Jarden was acquired by Newell Rubbermaid on April 15, 2016, with
  the combined entity rebranded as Newell Brands. As such, Jarden no longer
  exists as an independent company and does not maintain its own APIs.
